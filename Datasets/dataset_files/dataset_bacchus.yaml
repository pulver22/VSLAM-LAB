dataset_name: bacchus

rgb_hz: 10.0
modes: ["mono"]
cam_models: ["pinhole"]

source_root_env: BACCHUS_KTIMA_ROOT
source_root_default: /media/pulver/PulverHDD/BACCHUS/ktima
image_topic_env: BACCHUS_IMAGE_TOPIC
image_topic: /front/zed_node/rgb/image_rect_color/compressed
camera_info_topic_env: BACCHUS_CAMERA_INFO_TOPIC
camera_info_topics:
  - /front/zed_node/rgb/camera_info
  - /front/zed_node/left/camera_info
  - /front/zed_node/rgb/image_rect_color/camera_info
image_transport: compressed
decompressed_image_topic: /front/zed_node/rgb_decompressed
groundtruth_topic_env: BACCHUS_GROUNDTRUTH_TOPIC
groundtruth_topic: /odometry/gps
groundtruth_frame_source: tf
tf_topics: [/tf_static, /tf]
camera_frame_env: BACCHUS_CAMERA_FRAME
camera_frame: front_left_camera_optical_frame
camera_frame_candidates:
  - front_left_camera_optical_frame
  - front_left_camera_frame
  - front_camera_center
  - front_base_link
  - base_link
max_frames_env: BACCHUS_MAX_FRAMES
max_frames: 200
max_seconds_env: BACCHUS_MAX_SECONDS
max_seconds: 0
allow_placeholder_calibration_env: BACCHUS_ALLOW_PLACEHOLDER_CALIBRATION

sequence_names:
  - ktima_2022_03
  - ktima_2022_04
  - ktima_2022_05
  - ktima_2022_06
  - ktima_2022_07
  - ktima_2022_09

source_bags:
  ktima_2022_03: 03_march/rosbag_certh_compressed_2022-03-23-12-27-15.bag
  ktima_2022_04: 04_april/rosbag_compressed_2022-04-06-11-02-34.bag
  ktima_2022_05: 05_may/rosbag_compressed_2022-05-06.bag
  ktima_2022_06: 06_june/rosbag_compressed_2022-06-22-13-02-08.bag
  ktima_2022_07: 07_july/rosbag_compressed_2022-07-13-15-38-32.bag
  ktima_2022_09: 09_september/rosbag_compressed_2022-09-15-14-23-20.bag

